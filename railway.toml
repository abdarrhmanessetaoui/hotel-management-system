[build]
builder = "nixpacks"

[deploy]
# Safe Migration Practice: Runs once before the new version is live
releaseCommand = "php artisan migrate --force"
startCommand = "bash scripts/start.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.healthcheck]]
type = "http"
path = "/"
timeout = 100
interval = 30
threshold = 3