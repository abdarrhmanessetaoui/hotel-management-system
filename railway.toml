[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader && php artisan optimize:clear && php artisan storage:link && npm run build || true"

[deploy]
# Migrations run HERE (at deploy/release time), NOT at build time
# The private network is available here, unlike during build
startCommand = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php-fpm8.3 -D && nginx -g 'daemon off;'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.healthcheck]]
type = "http"
path = "/"