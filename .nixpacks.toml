[phases.setup]
nixPkgs = [
  "php83",
  "php83-fpm",
  "php83-extensions.pdo",
  "php83-extensions.pdo_mysql",
  "php83-extensions.mbstring",
  "php83-extensions.tokenizer",
  "php83-extensions.xml",
  "php83-extensions.ctype",
  "php83-extensions.fileinfo",
  "php83-extensions.bcmath",
  "php83-extensions.curl",
  "php83-extensions.zip",
  "php83-extensions.intl",
  "php83-extensions.gd",
  "composer",
  "nodejs_20",
  "nginx",
  "gettext"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build",
  "php artisan storage:link || true",
  "mkdir -p storage/framework/{sessions,views,cache}",
  "chmod -R 777 storage bootstrap/cache"
]

[start]
cmd = "bash scripts/start.sh"